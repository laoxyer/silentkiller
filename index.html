<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ular Tangga Kemesraan 🔞</title>
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600;700&display=swap"

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(
          135deg,
          #fff5f7 0%,
          #ffe5ec 50%,
          #ffc9dd 100%
        );
        min-height: 100vh;
        overflow-x: hidden;
      }
      .fancy-title {
        font-family: "Pacifico", cursive;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-10px);
        }
      }
      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow:
            0 0 20px rgba(255, 215, 0, 0.4),
            0 0 40px rgba(255, 215, 0, 0.2);
        }
        50% {
          box-shadow:
            0 0 30px rgba(255, 215, 0, 0.6),
            0 0 60px rgba(255, 215, 0, 0.3);
        }
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-5deg);
        }
        75% {
          transform: rotate(5deg);
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes confetti-fall {
        to {
          transform: translateY(100vh) rotate(360deg);
        }
      }
      .animate-float {
        animation: float 3s ease-in-out infinite;
      }
      .animate-pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }
      .animate-shake {
        animation: shake 0.5s ease-in-out;
      }
      .animate-slide-up {
        animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        animation: confetti-fall 3s linear infinite;
      }
      .board-tile {
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .glass-morphism {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .gradient-text {
        background: linear-gradient(135deg, #ff1493, #ff69b4, #ffb6c1);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-primary {
        background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
      }
      .btn-primary:active {
        transform: translateY(0);
      }

      /* ===== DICE 3D ===== */
      .dice-scene {
        perspective: 600px;
      }
      .dice-cube {
        width: 60px;
        height: 60px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 1s cubic-bezier(0.17, 0.67, 0.25, 1);
      }
      .dice-face {
        position: absolute;
        width: 60px;
        height: 60px;
        background: white;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow:
          inset 0 0 8px rgba(0, 0, 0, 0.15),
          0 6px 16px rgba(0, 0, 0, 0.25);
      }
      .face1 {
        transform: rotateY(0deg) translateZ(30px);
      }
      .face2 {
        transform: rotateY(180deg) translateZ(30px);
      }
      .face3 {
        transform: rotateY(90deg) translateZ(30px);
      }
      .face4 {
        transform: rotateY(-90deg) translateZ(30px);
      }
      .face5 {
        transform: rotateX(90deg) translateZ(30px);
      }
      .face6 {
        transform: rotateX(-90deg) translateZ(30px);
      }

      @keyframes dicePhysics {
        0% {
          transform: rotateX(0) rotateY(0) scale(1);
        }
        25% {
          transform: rotateX(180deg) rotateY(220deg) scale(1.15);
        }
        50% {
          transform: rotateX(420deg) rotateY(380deg) scale(1.1);
        }
        75% {
          transform: rotateX(620deg) rotateY(520deg) scale(1.05);
        }
        100% {
          transform: rotateX(720deg) rotateY(720deg) scale(1);
        }
      }
      .rolling {
        animation: dicePhysics 1s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
    </style>
  </head>
  <body>

      // ==================== SVG PIECES ====================
      const Snake = ({ start, end }) => {
        const s = getTilePosition(start),
          e = getTilePosition(end);
        const sx = s.col * 10 + 5,
          sy = s.row * 10 + 5;
        const ex = e.col * 10 + 5,
          ey = e.row * 10 + 5;
        const dx = ex - sx,
          dy = ey - sy;
        const mx = (sx + ex) / 2 + dy * 0.2,
          my = (sy + ey) / 2 - dx * 0.2;
        const d = `M ${sx} ${sy} Q ${mx} ${my} ${ex} ${ey}`;
        return (
          <g>
            <path
              d={d}
              fill="none"
              stroke="white"
              strokeWidth="2.6"
              strokeLinecap="round"
            />

              d={d}
              fill="none"
              stroke="#E91E63"
              strokeWidth="1.6"
              strokeLinecap="round"
            />

              cx={sx}

      const Ladder = ({ start, end }) => {
        const s = getTilePosition(start),
          e = getTilePosition(end);
        const sx = s.col * 10 + 5,
          sy = s.row * 10 + 5;
        const ex = e.col * 10 + 5,
          ey = e.row * 10 + 5;
        const dx = ex - sx,
          dy = ey - sy;
        const len = Math.sqrt(dx * dx + dy * dy);
        const nx = -dy / len,
          ny = dx / len;
        const r = 0.8;
        const rungs = Array.from({ length: 3 }, (_, i) => {
          const t = (i + 1) / 4;
          const x = sx + dx * t,
            y = sy + dy * t;
          return (
            <line
              key={i}
              x1={x - nx * r}
              y1={y - ny * r}
              x2={x + nx * r}
              y2={y + ny * r}
              stroke="#FFD54F"
              strokeWidth="0.5"
            />
          );
        });
        return (
          <g>
            <line
              x1={sx - nx * r}
              y1={sy - ny * r}
              x2={ex - nx * r}
              y2={ey - ny * r}
              stroke="white"
              strokeWidth="1.8"
            />
            <line
              x1={sx + nx * r}
              y1={sy + ny * r}
              x2={ex + nx * r}
              y2={ey + ny * r}

              strokeWidth="1.8"
            />
            <line

              y1={sy - ny * r}
              x2={ex - nx * r}
              y2={ey - ny * r}

              y1={sy + ny * r}
              x2={ex + nx * r}

              strokeWidth="1.1"

        // ---- LOCK: useRef so the guard is synchronous, never stale ----
        const lockRef = useRef(false);
        // track live positions in a ref so async loops always read current value
        const posRef = useRef([1, 1]);

        const syncPos = (turn, val) => {
          posRef.current = posRef.current.map((p, i) => (i === turn ? val : p));
          setPositions([...posRef.current]);
        };

        // ---- challenge gate: returns a Promise that resolves when player taps Selesai/Skip ----
        // stored as a ref so performRoll can await it
        const challengeResolveRef = useRef(null);

        const openChallenge = (challenge, mystery) => {
          return new Promise((resolve) => {
            challengeResolveRef.current = resolve;
            setCurrentChallenge(challenge);
            setIsMystery(mystery);
            setShowChallenge(true);

        // ---- core movement + roll logic (fully async, sequential) ----
        const performRoll = async (turn) => {
          setIsRolling(true);
          setIsDiceRolling(true);
          setMessage("");

          const result = rollDice();

          // shuffle dice faces visually
          for (let i = 0; i < 10; i++) {
            setDiceFace(Math.floor(Math.random() * 6) + 1);
            await sleep(70);
          }
          setDiceFace(result);
          await sleep(600); // slightly faster settle
          setIsDiceRolling(false);

          const isSix = result === 6;
          if (isSix) {
            setMessage(`🎲 Dapet 6! ${players[turn].name} lempar lagi!`);
            setBonusRoll(true);
          } else {
            setBonusRoll(false);
          }

          // step-by-step movement
          const start = posRef.current[turn];
          let target = start + result;
          if (target > 100) target = 100 - (target - 100);

          let cur = start;
          while (cur !== target) {
            cur += cur < target ? 1 : -1;
            syncPos(turn, cur);
            await sleep(80); // snappier steps
          }

          await sleep(150);

          // snake / ladder
          const snake = SNAKES.find((s) => s.start === target);
          const ladder = LADDERS.find((l) => l.start === target);
          let finalPos = target;

          if (snake) {
            setMessage("Kena ular! 🐍");
            await sleep(400);
            syncPos(turn, snake.end);
            finalPos = snake.end;
            await sleep(200);
          } else if (ladder) {
            setMessage("Naik tangga! 🪜");
            await sleep(400);
            syncPos(turn, ladder.end);
            finalPos = ladder.end;
            await sleep(200);
          } else if (target === 100) {
            setMessage("🎉 Sampai finish!");
            await sleep(600);
            onWin(players[turn]);
            return; // game over, keep lock
          }

          // check for challenge on finalPos
          const fixed = FIXED_CHALLENGES.find((c) => c.tile === finalPos);
          const mystery = MYSTERY_BOXES.includes(finalPos);

          if (fixed) {
            await openChallenge(fixed, false);
          } else if (mystery) {
            const pool = await new Promise((res) => {
              setUsedMysteries((prev) => {
                res(prev);
                return prev;
              });
            });
            const mysteryText = getRandomMystery(pool);
            setUsedMysteries((prev) => [...prev, mysteryText]);
            await openChallenge(mysteryText, true);
          }

          // all done — now decide turn
          if (isSix) {
            // same player rolls again, unlock immediately
            setMessage(`🎲 Dapet 6! ${players[turn].name} lempar lagi!`);
          } else {
            setMessage("");
            setCurrentTurn(1 - turn); // switch NOW, synchronously inside async flow
            await sleep(50); // tiny yield so React can re-render turn indicator
          }

          // release lock — pion sudah berhenti, turn sudah pindah
          lockRef.current = false;
          setIsRolling(false);
        };

        // ---- button handler: useRef lock prevents any spam ----
        const handleRollDice = () => {
          if (lockRef.current) return; // hard synchronous guard
          lockRef.current = true;
          performRoll(currentTurn);
        };

        const handleChallengeClose = () => {
          setShowChallenge(false);
          setCurrentChallenge(null);
          setMessage("");
          setBonusRoll(false);
          if (challengeResolveRef.current) {
            challengeResolveRef.current();
            challengeResolveRef.current = null;
          }
        };

        const handleSkipChallenge = () => {
          setShowChallenge(false);
          setCurrentChallenge(null);
          setMessage("Challenge di-skip");
          setBonusRoll(false);
          if (challengeResolveRef.current) {
            challengeResolveRef.current();
            challengeResolveRef.current = null;
          }
        };

        return (
          <div className="min-h-screen p-2 md:p-4">
            {/* Player Stats */}
            <div className="glass-morphism rounded-2xl p-4 mb-4 max-w-4xl mx-auto">
              <div className="flex justify-between items-center">
                {[0, 1].map((i) => (
                  <div
                    key={i}
                    className={`flex items-center gap-3 ${i === 1 ? "flex-row-reverse" : ""} ${currentTurn === i ? "opacity-100 scale-105" : "opacity-60"} transition-all`}
                  >
                    <span className="text-4xl">{players[i].emoji}</span>
                    <div className={i === 1 ? "text-right" : ""}>
                      <p className="font-bold text-pink-900">
                        {players[i].name}
                      </p>
                      <p className="text-sm text-pink-600">
                        Posisi: {positions[i]}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
              <div className="mt-4 text-center">
                <p className="text-lg font-bold gradient-text">
                  ▸ Giliran: {players[currentTurn].name}{" "}
                  {players[currentTurn].emoji}
                </p>
                {message && (
                  <p className="text-pink-600 mt-2 font-medium animate-pulse">
                    {message}
                  </p>
                )}
              </div>
            </div>

            {/* Board */}
            <div className="max-w-4xl mx-auto mb-6">
              <div className="glass-morphism rounded-3xl p-2 md:p-4 shadow-2xl">
                <svg viewBox="0 0 100 100" className="w-full h-auto">
                  {/* Tiles */}
                  {Array.from({ length: 100 }, (_, i) => {
                    const n = i + 1;
                    const pos = getTilePosition(n);
                    const isSnake = SNAKES.some((s) => s.start === n);
                    const isLadder = LADDERS.some((l) => l.start === n);
                    const isMys = MYSTERY_BOXES.includes(n);
                    const ch = FIXED_CHALLENGES.find((c) => c.tile === n);
                    let fill =
                      (pos.row + pos.col) % 2 === 0 ? "#FF69B4" : "#FFB6C1";
                    if (isSnake) fill = "#FFE5EC";
                    if (isLadder) fill = "#FFF8DC";
                    return (
                      <g key={n}>
                        <rect
                          x={pos.col * 10}
                          y={pos.row * 10}
                          width={10}
                          height={10}
                          fill={fill}
                          stroke="#FFF"
                          strokeWidth="0.2"
                        />
                        <text
                          x={pos.col * 10 + 1}
                          y={pos.row * 10 + 2.5}
                          fontSize="1.5"
                          fill="#FFFFFF"
                          fontWeight="bold"
                        >
                          {n}
                        </text>
                        {isMys && (
                          <text
                            x={pos.col * 10 + 5}
                            y={pos.row * 10 + 6.5}
                            fontSize="4"
                            textAnchor="middle"
                          >
                            🎁
                          </text>
                        )}
                        {ch && (
                          <text
                            x={pos.col * 10 + 5}
                            y={pos.row * 10 + 6.5}
                            fontSize="3"
                            textAnchor="middle"
                          >
                            {ch.icon}
                          </text>
                        )}
                      </g>
                    );
                  })}
                  {/* Snakes & Ladders */}
                  {SNAKES.map((s, i) => (
                    <Snake key={i} start={s.start} end={s.end} />
                  ))}
                  {LADDERS.map((l, i) => (
                    <Ladder key={i} start={l.start} end={l.end} />
                  ))}
                  {/* Players */}
                  {positions.map((pos, i) => {
                    const p = getTilePosition(pos);
                    const ox = i === 0 ? -1.8 : 1.8;
                    return (
                      <g key={i}>
                        <circle
                          cx={p.col * 10 + 5 + ox}
                          cy={p.row * 10 + 5.8}
                          r="2.2"
                          fill="white"
                          opacity="0.9"
                        />
                        <text
                          x={p.col * 10 + 5 + ox}
                          y={p.row * 10 + 7}
                          fontSize="4.2"
                          textAnchor="middle"
                        >
                          {players[i].emoji}
                        </text>
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>

            {/* Dice */}
            <div className="text-center max-w-md mx-auto">
              <div className="dice-scene mb-4 flex justify-center">
                <div
                  className={`dice-cube ${isDiceRolling ? "rolling" : ""}`}
                  style={{ transform: DICE_ROTATIONS[diceFace] }}
                >
                  <div className="dice-face face1">⚀</div>
                  <div className="dice-face face2">⚁</div>
                  <div className="dice-face face3">⚂</div>
                  <div className="dice-face face4">⚃</div>
                  <div className="dice-face face5">⚄</div>
                  <div className="dice-face face6">⚅</div>
                </div>
              </div>
              <button
                onClick={handleRollDice}
                disabled={isRolling}
                className={`btn-primary px-8 py-4 rounded-2xl text-white font-bold text-xl shadow-2xl w-full ${isRolling ? "opacity-60" : "cursor-pointer"}`}
              >
                {isRolling
                  ? "Rolling... 🎲"
                  : bonusRoll
                    ? `🎲 Lempar Lagi! ${players[currentTurn].name}`
                    : `Lempar Dadu — ${players[currentTurn].name} 🎲`}
              </button>
            </div>

            {/* Challenge Popup */}
            {showChallenge && currentChallenge && (
              <ChallengePopup
                challenge={currentChallenge}
                isMystery={isMystery}
                onClose={handleChallengeClose}
                onSkip={handleSkipChallenge}
              />
            )}
          </div>
        );
      };

      // ==================== APP ====================
      const App = () => {
        const [screen, setScreen] = useState("landing");
        const [players, setPlayers] = useState(null);
        const [winner, setWinner] = useState(null);
        return (
          <>
            {screen === "landing" && (
              <LandingPage onStart={() => setScreen("setup")} />
            )}
            {screen === "setup" && (
              <PlayerSetup
                onStart={(p) => {
                  setPlayers([p.player1, p.player2]);
                  setScreen("game");
                }}
              />
            )}
            {screen === "game" && players && (
              <GameBoard
                players={players}
                onWin={(w) => {
                  setWinner(w);
                  setScreen("win");
                }}
              />
            )}
            {screen === "win" && winner && (
              <WinScreen
                winner={winner}
                onRestart={() => {
                  setScreen("landing");
                  setPlayers(null);
                  setWinner(null);
                }}
              />
            )}
          </>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
